name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DATABASE_URL: postgresql://ci:ci@localhost/ci
      BETTER_AUTH_SECRET: placeholder-secret-at-least-32-chars-long-abc
      BETTER_AUTH_URL: http://localhost:5173
      PUBLIC_BETTER_AUTH_URL: http://localhost:5173
      GOOGLE_CLIENT_ID: placeholder-google-client-id
      GOOGLE_CLIENT_SECRET: placeholder-google-client-secret
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Dead code + duplication gate
        run: pnpm fallow

  e2e:
    needs: ci
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost/ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
